<div class="menu">
  <!-- Solução caso exista um caminho base e a mudança de estilo seja específica. Caso do /componentes ser parte do caminho das outras rotas - Para o routerLink ser mais preciso na sua mudança de estado interna
      Ou seja, não apenas identificar se o caminho componentes existe, mas identificar se o caminho é exatamente o caminho do routerLink, função do routerLinkActiveOptions.
      Ao analisar a sua documentação, vejo uma propriedade e uma função isActive, que checa a url, a arvore de urls e recebe um sinal booleano. Ao especificar exact = true me diz duas coisas:
      1) existe uma árvore de url e uma compoe a outra, e que meu routerLinkActive só irá aplicar as classes caso a url do routerLink daquele seletor for exatmente aquela.
      Sem o options exact, se a url base for a base das outras url(url filhos), a classe tambem será aplicada
  -->
  <div class="menu__item" routerLinkActive="menu__item--selected" [routerLinkActiveOptions]="{ exact: true }" #rlaBase="routerLinkActive">
    <a class="menu__link" routerLink="componentes">
      Base  {{rlaBase.isActive ? 'Ativado': ''}}
    </a>
  </div>
  <div class="menu__item" routerLinkActive="menu__item--selected"[routerLinkActiveOptions]="{ exact: true }" #rlaPrimeiro="routerLinkActive">
      <a class="menu__link" routerLink="componentes/primeiro">
        Primeiro  {{rlaPrimeiro.isActive ? 'Ativado': ''}}
      </a>
  </div>
  <div class="menu__item" routerLinkActive="menu__item--selected"[routerLinkActiveOptions]="{ exact: true }" #rlaSegundo="routerLinkActive">
      <a class="menu__link" routerLink="componentes/segundo">
        Segundo {{rlaSegundo.isActive ? 'Ativado' : ''}}
      </a>
  </div>
</div>
<!-- Indica onde vai ser carregada a troca de router  -->
<router-outlet></router-outlet>
